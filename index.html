<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>幸运转盘</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      touch-action: manipulation;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #fff;
      padding: 18px 12px;
    }

    .header {
      text-align: center;
      margin-bottom: 2vh;
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.25);
      letter-spacing: 3px;
    }

    .subtitle {
      color: #aaa;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      margin-top: 4px;
    }

    .wheel-wrap {
      position: relative;
      flex-shrink: 0;
      width: min(82vw, 62vh, 480px);
      height: min(82vw, 62vh, 480px);
      padding: 10px;
      box-sizing: content-box;
    }

    #wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
      box-shadow:
        0 0 30px rgba(0, 0, 0, 0.5),
        0 0 80px rgba(233, 69, 96, 0.12);
    }

    .pointer {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.3));
    }

    .pointer::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: clamp(10px, 2.4vw, 17px) solid transparent;
      border-right: clamp(10px, 2.4vw, 17px) solid transparent;
      border-top: clamp(20px, 4.8vw, 34px) solid #e94560;
    }

    .pointer::after {
      content: "";
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(10px, 2vw, 13px);
      height: clamp(10px, 2vw, 13px);
      background: #e94560;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(44px, 12%, 64px);
      height: clamp(44px, 12%, 64px);
      background: #fff;
      border-radius: 50%;
      z-index: 5;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
      pointer-events: none;
    }

    .wheel-center::after {
      content: "";
      position: absolute;
      inset: 35%;
      border-radius: 50%;
      background: #e94560;
      opacity: 0.9;
    }

    .btn {
      margin-top: 2.5vh;
      padding: clamp(10px, 2vh, 15px) clamp(36px, 8vw, 65px);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #e94560, #ff6b6b);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
      transition: all 0.25s ease;
      letter-spacing: 2px;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    .btn:hover,
    .btn:active {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 25px rgba(233, 69, 96, 0.6);
    }

    .btn:disabled {
      background: #555;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .result-area {
      margin-top: 2vh;
      text-align: center;
      flex-shrink: 0;
      min-height: 76px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
    }

    .result {
      font-size: clamp(1rem, 3vw, 1.35rem);
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.5s ease;
      line-height: 1.5;
      max-width: min(90vw, 680px);
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .result.show {
      opacity: 1;
      transform: scale(1);
    }

    .result span {
      color: #ffd700;
      font-weight: bold;
      font-size: clamp(1.15rem, 3.5vw, 1.55rem);
    }

    .options-list {
      margin-top: 8px;
      color: #aaa;
      font-size: clamp(0.7rem, 1.8vw, 0.85rem);
      max-width: min(90vw, 620px);
      line-height: 1.5;
      word-break: break-word;
      overflow-wrap: anywhere;
      max-height: 3.2em;
      overflow: hidden;
    }

    .confetti {
      position: fixed;
      width: 8px;
      height: 8px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 999;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      body {
        justify-content: flex-start;
      }

      .header {
        margin-bottom: 1vh;
      }

      .wheel-wrap {
        width: min(52vh, 42vw, 360px);
        height: min(52vh, 42vw, 360px);
        padding: 8px;
      }

      .btn {
        margin-top: 1.5vh;
        padding: 8px 36px;
      }

      .result-area {
        margin-top: 1vh;
        min-height: 50px;
      }
    }

    @media (max-width: 360px) {
      .wheel-wrap {
        width: 86vw;
        height: 86vw;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>🎯 幸运转盘</h1>
    <p class="subtitle">点击按钮，让命运来决定</p>
  </div>

  <div class="wheel-wrap" id="wheelWrap">
    <div class="pointer"></div>
    <canvas id="wheel"></canvas>
    <div class="wheel-center"></div>
  </div>

  <button class="btn" id="spinBtn" disabled>开始转动</button>

  <div class="result-area">
    <div class="result" id="result"></div>
    <div class="options-list" id="optionsList"></div>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById("wheel");
      const ctx = canvas.getContext("2d");
      const spinBtn = document.getElementById("spinBtn");
      const resultDiv = document.getElementById("result");
      const optionsListDiv = document.getElementById("optionsList");
      const wheelWrap = document.getElementById("wheelWrap");

      let options = [];
      let displayLabels = [];
      let fullLabels = [];

      const colors = [
        "#E63946",
        "#1D3557",
        "#457B9D",
        "#2A9D8F",
        "#E9C46A",
        "#F4A261",
        "#264653",
        "#8338EC",
        "#06D6A0",
        "#EF476F",
        "#118AB2",
        "#073B4C",
        "#FF6B6B",
        "#4ECDC4",
        "#45B7D1"
      ];

      let currentAngle = 0;
      let isSpinning = false;
      let dpr = 1;
      let canvasSize = 0;

      const defaultOptions = [
        "全程夹子音说话一分钟，不能破功",
        "对着镜头深情表白对面主播 30 秒",
        "模仿三种动物走路 + 叫声，连贯表演",
        "双手比心，原地慢摇扭胯一分钟",
        "用方言大声朗读对面主播的主页简介",
        "闭眼随机夸直播间路人，每人一句话",
        "单手托腮，装高冷面瘫三分钟不笑",
        "唱一首跑调版儿歌，全程不能停",
        "头顶纸巾 / 小物件，保持不掉坚持 1 分钟",
        "假装害羞社恐，小声碎碎念自我介绍"
      ];

      function resizeCanvas() {
        const rect = wheelWrap.getBoundingClientRect();
        const pad = parseFloat(getComputedStyle(wheelWrap).padding) || 10;
        const size = Math.floor(Math.min(rect.width, rect.height) - pad * 2);

        if (!size || size <= 0) {
          return;
        }

        if (Math.abs(size - canvasSize) < 2) {
          return;
        }

        canvasSize = size;
        dpr = Math.min(window.devicePixelRatio || 1, 2);

        canvas.width = size * dpr;
        canvas.height = size * dpr;
        canvas.style.width = size + "px";
        canvas.style.height = size + "px";

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        if (options.length > 0) {
          drawWheel();
        }
      }

      function parseOptions(text) {
        return String(text)
          .split(/\r?\n/)
          .map(function (item) {
            return item.trim();
          })
          .filter(function (item) {
            return item.length > 0;
          });
      }

      function buildDisplayLabels(items) {
        fullLabels = items.slice();

        displayLabels = items.map(function (text, index) {
          const cleanText = String(text).trim();

          if (cleanText.length <= 6) {
            return cleanText;
          }

          return "选项" + (index + 1);
        });
      }

      function initOptions(data) {
        if (Array.isArray(data)) {
          options = data.map(function (item) {
            return String(item).trim();
          }).filter(function (item) {
            return item.length > 0;
          });
        } else {
          options = [];
        }

        if (options.length === 0) {
          options = ["选项1", "选项2", "选项3", "选项4"];
        }

        buildDisplayLabels(options);

        optionsListDiv.textContent = "当前选项：" + options.join(" · ");
        spinBtn.disabled = false;

        resizeCanvas();
        drawWheel();
      }

      async function tryFetch() {
        try {
          const res = await fetch("options.txt", {
            cache: "no-store"
          });

          if (!res.ok) {
            throw new Error("options.txt 加载失败");
          }

          const text = await res.text();
          const parsed = parseOptions(text);

          if (parsed.length > 0) {
            initOptions(parsed);
          } else {
            initOptions(defaultOptions.slice());
          }
        } catch (error) {
          initOptions(defaultOptions.slice());
        }
      }

      function setFont(size) {
        ctx.font = "bold " + size + "px -apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Microsoft YaHei\", sans-serif";
      }

      function wrapText(text, maxWidth, fontSize) {
        setFont(fontSize);

        const chars = String(text).split("");
        const lines = [];
        let line = "";

        for (let i = 0; i < chars.length; i++) {
          const char = chars[i];
          const testLine = line + char;

          if (ctx.measureText(testLine).width > maxWidth && line.length > 0) {
            lines.push(line);
            line = char;
          } else {
            line = testLine;
          }
        }

        if (line) {
          lines.push(line);
        }

        return lines.length ? lines : [String(text)];
      }

      function calcBestFont(text, maxWidth, maxHeight) {
        let size = Math.max(12, Math.min(24, canvasSize * 0.05));
        let lines = [];
        let fit = false;

        while (size >= 10 && !fit) {
          lines = wrapText(text, maxWidth, size);

          const lineHeight = size + Math.max(2, size * 0.1);
          const totalHeight = lines.length * lineHeight;

          if (totalHeight <= maxHeight) {
            fit = true;
          } else {
            size -= 1;
          }
        }

        if (!fit) {
          size = 10;
          lines = wrapText(text, maxWidth, size);
        }

        return {
          size: size,
          lines: lines,
          lineHeight: size + Math.max(2, size * 0.1)
        };
      }

      function drawWheel() {
        if (!canvasSize || options.length === 0) {
          return;
        }

        const size = canvasSize;
        const cx = size / 2;
        const cy = size / 2;
        const padding = Math.max(12, size * 0.025);
        const radius = size / 2 - padding;
        const anglePer = Math.PI * 2 / options.length;

        ctx.clearRect(0, 0, size, size);

        for (let i = 0; i < options.length; i++) {
          const startAngle = currentAngle + i * anglePer;
          const endAngle = startAngle + anglePer;

          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, radius, startAngle, endAngle);
          ctx.closePath();
          ctx.fillStyle = colors[i % colors.length];
          ctx.fill();

          ctx.strokeStyle = "rgba(255, 255, 255, 0.65)";
          ctx.lineWidth = Math.max(1, size * 0.002);
          ctx.stroke();

          drawSectorText({
            cx: cx,
            cy: cy,
            radius: radius,
            size: size,
            startAngle: startAngle,
            anglePer: anglePer,
            text: displayLabels[i]
          });
        }

        ctx.beginPath();
        ctx.arc(cx, cy, radius + size * 0.008, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
        ctx.lineWidth = Math.max(1.5, size * 0.003);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(cx, cy, radius - size * 0.006, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(0, 0, 0, 0.28)";
        ctx.lineWidth = Math.max(2, size * 0.006);
        ctx.stroke();
      }

      function drawSectorText(config) {
        const cx = config.cx;
        const cy = config.cy;
        const radius = config.radius;
        const size = config.size;
        const startAngle = config.startAngle;
        const anglePer = config.anglePer;
        const text = config.text;

        const textAngle = startAngle + anglePer / 2;
        const normalizedAngle = ((textAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        const isOnLeft = normalizedAngle > Math.PI / 2 && normalizedAngle < Math.PI * 1.5;

        const hubRadius = size * 0.09;
        const textStart = hubRadius + size * 0.04;
        const textEnd = radius - size * 0.06;
        const textRadius = (textStart + textEnd) / 2;
        const availableWidth = Math.max(28, textEnd - textStart);
        const availableHeight = Math.max(16, radius * anglePer * 0.46);

        ctx.save();
        ctx.translate(cx, cy);

        ctx.rotate(textAngle);
        ctx.translate(textRadius, 0);

        if (isOnLeft) {
          ctx.rotate(Math.PI);
        }

        const info = calcBestFont(text, availableWidth, availableHeight);
        const totalHeight = info.lines.length * info.lineHeight;

        let y = -totalHeight / 2 + info.lineHeight / 2;

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        for (let i = 0; i < info.lines.length; i++) {
          const line = info.lines[i];

          ctx.lineWidth = Math.max(2, info.size * 0.16);
          ctx.strokeStyle = "rgba(0, 0, 0, 0.45)";
          ctx.lineJoin = "round";
          ctx.strokeText(line, 0, y);

          ctx.fillStyle = "#fff";
          ctx.fillText(line, 0, y);

          y += info.lineHeight;
        }

        ctx.restore();
      }

      function spin() {
        if (isSpinning || options.length === 0) {
          return;
        }

        isSpinning = true;
        spinBtn.disabled = true;
        spinBtn.textContent = "转动中…";
        resultDiv.classList.remove("show");
        resultDiv.textContent = "";

        const targetIndex = Math.floor(Math.random() * options.length);
        const anglePer = Math.PI * 2 / options.length;
        const twoPI = Math.PI * 2;

        const pointerAngle = -Math.PI / 2;

        const targetCenterAngle = currentAngle + targetIndex * anglePer + anglePer / 2;
        const rawDelta = pointerAngle - targetCenterAngle;
        const delta = ((rawDelta % twoPI) + twoPI) % twoPI;

        const extraSpins = 5 + Math.floor(Math.random() * 4);
        const startAngle = currentAngle;
        const endAngle = startAngle + extraSpins * twoPI + delta;

        const duration = 4500;
        const startTime = performance.now();

        function animate(now) {
          const progress = Math.min((now - startTime) / duration, 1);
          const ease = 1 - Math.pow(1 - progress, 4);

          currentAngle = startAngle + (endAngle - startAngle) * ease;
          drawWheel();

          if (progress < 1) {
            requestAnimationFrame(animate);
          } else {
            currentAngle = ((endAngle % twoPI) + twoPI) % twoPI;
            drawWheel();

            isSpinning = false;
            spinBtn.disabled = false;
            spinBtn.textContent = "再转一次";

            showResult(fullLabels[targetIndex]);
          }
        }

        requestAnimationFrame(animate);
      }

      function showResult(winner) {
        resultDiv.innerHTML = "";

        const prefix = document.createTextNode("🎉 结果：");
        const span = document.createElement("span");
        const suffix = document.createTextNode(" 🎉");

        span.textContent = winner;

        resultDiv.appendChild(prefix);
        resultDiv.appendChild(span);
        resultDiv.appendChild(suffix);

        resultDiv.classList.add("show");

        createConfetti();
      }

      function createConfetti() {
        const palette = ["#e94560", "#ffd700", "#16c79a", "#00bbf9", "#ff6b6b", "#ffffff"];
        const count = Math.min(50, window.innerWidth < 500 ? 28 : 50);

        for (let i = 0; i < count; i++) {
          const confetti = document.createElement("div");

          confetti.className = "confetti";
          confetti.style.left = Math.random() * 100 + "vw";
          confetti.style.top = "-10px";
          confetti.style.backgroundColor = palette[Math.floor(Math.random() * palette.length)];

          const size = Math.random() * 8 + 4;

          confetti.style.width = size + "px";
          confetti.style.height = size + "px";
          confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
          confetti.style.animationDuration = Math.random() * 2 + 2 + "s";

          document.body.appendChild(confetti);

          setTimeout(function () {
            confetti.remove();
          }, 4000);
        }
      }

      spinBtn.addEventListener("click", spin);

      let resizeTimer;

      window.addEventListener("resize", function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
          resizeCanvas();
        }, 150);
      });

      window.addEventListener("orientationchange", function () {
        setTimeout(function () {
          resizeCanvas();
        }, 300);
      });

      resizeCanvas();
      tryFetch();
    })();
  </script>
</body>
</html>
